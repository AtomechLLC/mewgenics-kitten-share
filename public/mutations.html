const slotColors = {
  body:"s-body",ear:"s-ear",eyebrow:"s-eyebrow",eye:"s-eye",
  fur:"s-fur",head:"s-head",leg:"s-leg",mouth:"s-mouth",tail:"s-tail"
};
const slots = ["body","ear","eyebrow","eye","fur","head","leg","mouth","tail"];

let activeSlot = "all";
let sortCol = -1;
let sortDir = 1; // 1=asc, -1=desc

function getVisible() {
  const q = document.getElementById('srch').value.toLowerCase();
  return data.filter(([name,slot,effect,type]) => {
    if (activeSlot !== 'all' && slot !== activeSlot) return false;
    if (q && !name.toLowerCase().includes(q) && !effect.toLowerCase().includes(q) && !slot.includes(q) && !type.includes(q)) return false;
    return true;
  });
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir *= -1;
  } else {
    sortCol = col;
    sortDir = 1;
  }
  document.querySelectorAll('thead th').forEach((th, i) => {
    th.classList.remove('sort-asc','sort-desc');
    if (i === col) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  });
  renderTable();
}

function renderTable() {
  let rows = getVisible();
  if (sortCol >= 0) {
    rows = [...rows].sort((a, b) => {
      const av = a[sortCol].toLowerCase();
      const bv = b[sortCol].toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }
  const tbody = document.getElementById('tbody');
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="4" class="no-results">No results found</td></tr>';
    document.getElementById('cnt').textContent = 'No entries match';
    return;
  }
  tbody.innerHTML = rows.map(([name,slot,effect,type]) => {
    const isDefect = type === 'defect';
    const defBadge = isDefect ? '<span class="defect-badge">defect</span>' : '';
    return `<tr>
      <td><strong style="font-weight:600">${name}</strong>${defBadge}</td>
      <td><span class="slot-badge ${slotColors[slot]}">${slot}</span></td>
      <td class="effect">${effect}</td>
      <td class="type-cell">${isDefect ? 'Birth defect' : 'Mutation'}</td>
    </tr>`;
  }).join('');
  document.getElementById('cnt').textContent = `Showing ${rows.length} of ${data.length} entries`;
}

// Build slot filter buttons
const btnWrap = document.getElementById('slotBtns');
['all', ...slots].forEach(s => {
  const btn = document.createElement('button');
  btn.textContent = s === 'all' ? 'All' : s.charAt(0).toUpperCase() + s.slice(1);
  if (s === 'all') btn.classList.add('active');
  btn.onclick = () => {
    activeSlot = s;
    btnWrap.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
  };
  btnWrap.appendChild(btn);
});

function downloadCSV() {
  const rows = getVisible();
  let csv = 'Name,Slot,Effect,Type\n';
  rows.forEach(([name, slot, effect, type]) => {
    const esc = v => '"' + v.replace(/"/g, '""') + '"';
    csv += [esc(name), esc(slot), esc(effect), esc(type === 'defect' ? 'Birth Defect' : 'Mutation')].join(',') + '\n';
  });
  const blob = new Blob([csv], {type: 'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mewgenics_mutations.csv';
  a.click();
}
