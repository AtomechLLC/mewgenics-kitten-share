<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mewgenics — Abilities by Class</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:Arial,sans-serif;font-size:14px;color:#222;background:#f7f3ec;padding:1.5rem}
  h1{font-size:20px;font-weight:600;margin-bottom:4px}
  .subtitle{font-size:13px;color:#666;margin-bottom:1rem}
  #status{font-size:13px;color:#666;padding:8px 0;min-height:20px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
  .controls input{padding:6px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px;width:220px}
  .filter-btns{display:flex;gap:5px;flex-wrap:wrap}
  .filter-btns button{font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;border:1px solid #bbb;background:#fff;color:#555;transition:background .15s;white-space:nowrap}
  .filter-btns button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .row2{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;align-items:center}
  .type-btns,.cat-btns,.elem-btns{display:flex;gap:5px;flex-wrap:wrap}
  .type-btns button,.cat-btns button,.elem-btns button{font-size:11px;padding:3px 10px;border-radius:20px;cursor:pointer;border:1px solid #bbb;background:#fff;color:#555}
  .type-btns button.active{background:#2d6a4f;color:#fff;border-color:#2d6a4f}
  .cat-btns button.active{background:#7e3af2;color:#fff;border-color:#7e3af2}
  .elem-btns button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .elem-btns button.el-Fire{color:#c2410c}.elem-btns button.el-Ice{color:#0369a1}
  .elem-btns button.el-Electric{color:#a16207}.elem-btns button.el-Holy{color:#b45309}
  .elem-btns button.el-Physical{color:#7c2d12}.elem-btns button.el-Magical{color:#6d28d9}
  .elem-btns button.el-Water{color:#0891b2}.elem-btns button.el-Wind{color:#0d9488}
  .elem-btns button.el-Gravity{color:#6b21a8}.elem-btns button.el-Earth{color:#92400e}
  .elem-btns button.el-Grass{color:#15803d}.elem-btns button.el-Poison{color:#4d7c0f}
  .elem-btns button.el-Explosion{color:#ea580c}
  .elem-btns button.active{color:#fff}
  .dl-btn{margin-left:auto;padding:6px 14px;background:#2d6a4f;color:#fff;border:none;border-radius:6px;font-size:13px;cursor:pointer;font-weight:500}
  .dl-btn:hover{background:#1b4332}
  .count{font-size:12px;color:#888;margin-bottom:6px}
  /* view toggle */
  .view-btns{display:flex;gap:4px}
  .view-btns button{font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;border:1px solid #bbb;background:#fff;color:#555;white-space:nowrap}
  .view-btns button.active{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
  .tbl-wrap{overflow-x:auto;border:1px solid #ddd;border-radius:8px;background:#fff}
  /* card grid view */
  .tbl-wrap.as-cards{overflow:visible;border:none;background:transparent;border-radius:0}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
  .ab-card{position:relative;display:flex;flex-direction:column;border:1px solid #e5e7eb;border-left:4px solid var(--cls,#cbd5e1);border-radius:8px;background:#fff;padding:6px 9px;min-width:0}
  .ab-card-name{font-weight:600;font-size:13px;text-align:center;margin-bottom:3px;padding:0 20px}
  .ab-card-cat{position:absolute;top:5px;right:6px;display:flex;opacity:.85}
  .ab-card-cat svg{width:16px;height:16px}
  .ab-card-row{display:flex;align-items:flex-start;gap:8px}
  .ab-card-icon{flex:none;display:flex}
  .ab-card-icon .ability-icon,.ab-card-icon .ability-icon-missing{width:32px;height:32px;margin:0}
  .ab-card-desc{flex:1;min-width:0;font-size:12px;line-height:1.45;color:#555}
  .ab-card-mp{flex:none;font-size:12px;font-weight:600;color:#555;white-space:nowrap;align-self:center}
  /* card left edge color comes from --cls (see class palette above) */
  table{border-collapse:collapse;width:100%;min-width:700px}
  thead th{
    background:#1a1a2e;color:#fff;font-size:12px;font-weight:600;
    text-transform:uppercase;letter-spacing:.04em;padding:9px 12px;
    text-align:left;white-space:nowrap;position:sticky;top:0;
    cursor:pointer;user-select:none;
  }
  thead th:hover{background:#2d2d50}
  thead th.sort-asc::after{content:" ▲";font-size:10px;opacity:.9}
  thead th.sort-desc::after{content:" ▼";font-size:10px;opacity:.9}
  thead th:not(.sort-asc):not(.sort-desc)::after{content:" ⇅";font-size:10px;opacity:.35}
  td{padding:7px 12px;border-bottom:1px solid #eee;vertical-align:top;line-height:1.45}
  tr:last-child td{border-bottom:none}
  tr:hover td{background:#f9f9f9}
  /* Deep-linked row/card (#a=<id> from KittenShare) — a brief attention highlight. */
  .deeplink-hl td,.ab-card.deeplink-hl{background:#fdf3d6 !important;outline:2px solid #c0913f}
  .desc{color:#555;font-size:12px;margin-top:2px}
  .class-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 9px;border-radius:20px;white-space:nowrap;background:color-mix(in srgb, var(--cls,#9ca3af) 16%, #fff);color:color-mix(in srgb, var(--cls,#374151) 72%, #000)}
  .type-badge{display:inline-block;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;white-space:nowrap}
  .cat-badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:2px 8px 2px 5px;border-radius:10px;background:#ede9fe;color:#4c1d95;white-space:nowrap}
  .cat-badge svg{width:14px;height:14px;flex:none}
  .cat-Offense{background:#fee2e2;color:#991b1b}
  .cat-Defense{background:#dbeafe;color:#1e40af}
  .cat-Other{background:#dcfce7;color:#166534}
  .cat-Special{background:#fef3c7;color:#92400e}
  .no-results{text-align:center;color:#999;padding:2rem;font-style:italic}
  /* Class colors pulled from the game's per-class cat palette
     (textures/palette.png inside resources.gpak — mid-tone fur shade of each
     class's palette row). --cls drives BOTH the table badge (tinted, above) and
     the card left edge (solid, below). */
  .c-fighter,    .clsbd-fighter    {--cls:#9f6565}  /* dusty red */
  .c-mage,       .clsbd-mage       {--cls:#9493b8}  /* periwinkle */
  .c-hunter,     .clsbd-hunter     {--cls:#375133}  /* forest green */
  .c-druid,      .clsbd-druid      {--cls:#4d362d}  /* brown */
  .c-tank,       .clsbd-tank       {--cls:#645431}  /* olive */
  .c-medic,      .clsbd-medic      {--cls:#c7ccd1}  /* white (nudged darker for legibility) */
  .c-monk,       .clsbd-monk       {--cls:#787878}  /* gray */
  .c-thief,      .clsbd-thief      {--cls:#ebe7a3}  /* pale yellow */
  .c-jester,     .clsbd-jester     {--cls:#97dfcb}  /* mint */
  .c-psychic,    .clsbd-psychic    {--cls:#4e415f}  /* dark purple */
  .c-necromancer,.clsbd-necromancer{--cls:#1b1b1b}  /* near-black */
  .c-tinkerer,   .clsbd-tinkerer   {--cls:#97dfcb}  /* mint */
  .c-butcher,    .clsbd-butcher    {--cls:#8f3747}  /* maroon */
  .c-colorless,  .clsbd-colorless  {--cls:#9aa0a6}  /* gray (no palette row) */
  .t-active {background:#dbeafe;color:#1e3a8a}
  .t-passive{background:#d1fae5;color:#065f46}
  .loader{text-align:center;padding:3rem;color:#888;font-size:15px}
  .error-box{background:#fee2e2;color:#991b1b;padding:1rem;border-radius:8px;margin:1rem 0}

  .icon-cell { width: 36px; text-align: center; padding: 4px 6px; }
  .ability-icon { width: 28px; height: 28px; image-rendering: pixelated; border-radius: 4px; display: block; margin: 0 auto; }
  .ability-icon-missing { width: 28px; height: 28px; display: inline-block; background: #e5e7eb; border-radius: 4px; }


  .status-icon {
    display: inline-flex;
    align-items: center;
    vertical-align: -0.22em;
    margin: 0 1px;
  }
  .status-icon svg { width: 1.15em; height: 1.15em; }
  .status-badge {
    display: inline-block;
    background: rgba(124, 58, 237, 0.12);
    color: #6d28d9;
    font-weight: 700;
    font-size: 0.85em;
    line-height: 1.3;
    border-radius: 4px;
    padding: 0 5px;
    margin: 0 1px;
    vertical-align: baseline;
    white-space: nowrap;
  }
  .unknown-token {
    font-size: 10px;
    background: #f3f4f6;
    color: #6b7280;
    border-radius: 3px;
    padding: 1px 3px;
    font-family: monospace;
    vertical-align: middle;
  }

</style>
</head>
<body>

<h1>Mewgenics — Abilities by Class (Collar)</h1>
<p class="subtitle">All active abilities and passives for each class · Descriptions and categories from <a href="https://mewgenics.wiki/api/v1/abilities.json" target="_blank">mewgenics.wiki</a> · Click headers to sort</p>
<div id="status">⏳ Loading ability data from mewgenics.wiki…</div>

<div class="controls" id="controls" style="display:none">
  <input type="search" id="srch" placeholder="Search name or description…" oninput="renderTable()">
  <div class="filter-btns" id="classBtns"></div>
</div>
<div class="row2" id="row2" style="display:none">
  <div class="type-btns" id="typeBtns"></div>
  <div class="cat-btns" id="catBtns"></div>
  <div class="elem-btns" id="elemBtns"></div>
  <div class="view-btns" id="viewBtns">
    <button id="viewTable" class="active" onclick="setView('table')" title="Table view">▤ Table</button>
    <button id="viewCards" onclick="setView('cards')" title="Card grid view">▦ Cards</button>
  </div>
  <button class="dl-btn" onclick="downloadCSV()">⬇ Download CSV</button>
</div>
<div class="count" id="cnt"></div>

<div class="tbl-wrap" id="tblWrap">
  <div class="loader" id="loader">Loading…</div>
</div>

// Display labels for stat/resource tokens (used as the tooltip / badge fallback)
const STAT_LABELS = {
  str:'STR', dex:'DEX', con:'CON', int:'INT', spd:'SPD', cha:'CHA', lck:'LCK',
  hp:'HP', mp:'MP', mana:'MP'
};

  str:'<svg viewBox="0 0 24 24"><g fill="#e23b3b"><rect x="2" y="8" width="3" height="8" rx="1"/><rect x="5" y="9.5" width="2" height="5" rx="1"/><rect x="7" y="11" width="10" height="2" rx="1"/><rect x="17" y="9.5" width="2" height="5" rx="1"/><rect x="19" y="8" width="3" height="8" rx="1"/></g></svg>',

// Resolve a record's best-guess category (by API id, then by normalized name)
function abilityCategory(r){
  return (r.id && ABILITY_CATEGORY[r.id]) || ABILITY_CATEGORY_BYNAME[catKey(r.name)] || '';
}
function catHtml(c){
  if(!c) return '<span style="color:#aaa">—</span>';

}

// Element filter tags. Physical/Magical come from damage type + ability type;
// Fire/Ice/Electric/Holy from the `elements` array. An ability can match several.
// Damage-type categories first, then specific elements (some game elements are folded
// into a parent: Napalm→Fire, Conducted→Electric, Rock→Earth, Bloom→Grass).
const ELEMENT_FILTERS = ['Physical','Magical','Fire','Ice','Electric','Holy','Water','Wind','Gravity','Earth','Grass','Poison','Explosion'];
const ELEMENT_ALIASES = {
  Fire:['fire','napalm'], Ice:['ice'], Electric:['electric','conducted'], Holy:['holy'],
  Water:['water'], Wind:['wind'], Gravity:['gravity'], Earth:['earth','rock'],
  Grass:['grass','bloom'], Poison:['poison'], Explosion:['explosion']
};
function computeElemTags(elements, dmgType, type) {
  const tags = [];
  const els = (elements || []).map(e => String(e).toLowerCase());
  for (const tag in ELEMENT_ALIASES) if (ELEMENT_ALIASES[tag].some(a => els.includes(a))) tags.push(tag);
  const dt = (dmgType || '').toLowerCase(), tp = (type || '').toLowerCase();
  if (dt === 'physical' || dt === 'combo') tags.push('Physical');
  if (tp === 'magic' || dt === 'magic' || dt === 'combo' || dt === 'contextualspell') tags.push('Magical');
  return tags;
}
// Offline fallback has no element data — infer loosely from the description + raw category.
function fallbackElemTags(rawCat, desc) {
  const d = (desc || '').toLowerCase(), els = [];
  if (/fire|burn|flame|lava|napalm/.test(d)) els.push('fire');
  if (/ice|freeze|frost|frozen|chill/.test(d)) els.push('ice');
  if (/electric|lightning|shock|thunder|volt/.test(d)) els.push('electric');
  if (/holy|divine|bless|sacred|smite/.test(d)) els.push('holy');
  if (/water|soak|wet|splash|wave/.test(d)) els.push('water');
  if (/\bwind|air|gust|gale|breeze/.test(d)) els.push('wind');
  if (/gravity|gravit/.test(d)) els.push('gravity');
  if (/earth|rock|stone|boulder|ground/.test(d)) els.push('earth');
  if (/grass|plant|vine|bloom|seed|thorn/.test(d)) els.push('grass');
  if (/poison|toxic|venom/.test(d)) els.push('poison');
  if (/explo|bomb|blast|detonat/.test(d)) els.push('explosion');
  const rc = (rawCat || '').toLowerCase();
  const dmgType = rc === 'magic' ? 'magic' : (rc === 'melee' || rc === 'ranged' ? 'physical' : '');
  return computeElemTags(els, dmgType, rc === 'magic' ? 'magic' : '');
}

function renderDesc(raw) {
  if (!raw) return '';
  // Split on bracketed tokens first: [token] or [img:token]
  var parts = raw.split(/(\[[^\]]+\])/g);
  var out = '';
  for (var i = 0; i < parts.length; i++) {
    var part = parts[i];
    // Check if it's a bracketed token
    var m = part.match(/^\[(?:img:)?([^\]]+)\]$/i);
    if (m) {
      var token = m[1].trim();
      // Handle [s:N] small-text open tag
      var sOpen = token.match(/^s:(\d*\.?\d+)$/i);
      if (sOpen) {
        out += '<span style="font-size:' + Math.round(parseFloat(sOpen[1])*100) + '%;opacity:0.75">';
        continue;
      }
      // Handle [/s] close tag
      if (token === '/s') { out += '</span>'; continue; }
      // Handle \n literal
      if (token === 'n' && part === '[n]') { out += '<br>'; continue; }
      // Render the token as an inline text badge (matches mewgenics.wiki, which
      // uses styled badges rather than icon images for status/keyword tokens).
      var isImg = /^\[\s*img:/i.test(part);
      var key = token.toLowerCase().replace(/[^a-z0-9]/g, '');
      if (isImg || TOKEN_IMGS[key]) {
        var label = STAT_LABELS[key] || (token.charAt(0).toUpperCase() + token.slice(1));
        var safeLabel = label.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        var safeTip = token.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        var svg = TOKEN_SVG[key];
        if (svg) {
          // Render as an inline icon glyph
          out += '<span class="status-icon" role="img" title="' + safeTip + '" aria-label="' + safeTip + '">' + svg + '</span>';
        } else {
          // Recognized token without a glyph — fall back to a styled text badge
          out += '<span class="status-badge" title="' + safeTip + '">' + safeLabel + '</span>';
        }
      } else {
        // Unknown / non-status bracket token — show as small mono badge
        out += '<span class="unknown-token">' + token.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</span>';
      }
    } else {
      // Plain text — escape HTML and convert \n to <br>
      out += part.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\\n/g,'<br>');
    }
  }
  return out;
}

let allData = [];
let sortCol = -1, sortDir = 1;
let activeClass = 'all', activeType = 'all', activeCat = 'all', activeElement = 'all';
let viewMode = 'table';  // 'table' | 'cards'

const CLASS_ORDER = ['butcher','colorless','druid','fighter','hunter','jester','mage','medic','monk','necromancer','psychic','tank','thief','tinkerer'];

// Normalize class names from API to our keys
function normalizeClass(c) {
  if (!c) return 'colorless';
  const s = c.toLowerCase().trim();
  if (s === 'collarless' || s === 'colorless' || s === 'none') return 'colorless';
  return s;
}

async function loadData() {
  try {
    const res = await fetch('https://mewgenics.wiki/api/v1/abilities.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();

    const records = json.records || json.abilities || json.data || json;
    if (!Array.isArray(records)) throw new Error('Unexpected data format');

    document.getElementById('status').textContent = `✅ Loaded ${records.length} abilities`;


    // Helper: extract a plain string from a value
    function str(v) {
      if (v == null) return '';
      if (typeof v === 'string') return v;
      if (typeof v === 'number') return String(v);
      if (typeof v === 'object') return v.en || v.value || v.text || String(Object.values(v)[0] || '');
      return '';
    }

    // From the API: type is "spell"/"passive"/"melee" etc, template is "spell"/"passive"
    // class is capitalised e.g. "Psychic", cost is {mana: N, ...}
    allData = records.map(r => {
      const name = str(r.name || r.id || r.title || '');
      const cls = normalizeClass(str(r.class || r.collar || ''));
      // Determine active vs passive from template or type field
      const template = str(r.template || '').toLowerCase();
      const typeRaw = str(r.type || '').toLowerCase();
      const type = (template === 'passive' || typeRaw === 'passive') ? 'passive' : 'active';
      // Mana is nested under cost.mana
      const mana = (r.cost && r.cost.mana != null) ? String(r.cost.mana) : '';
      const id = str(r.id);
      // Best-guess category derived from game files (overrides null API category)
      const category = ABILITY_CATEGORY[id] || ABILITY_CATEGORY_BYNAME[catKey(name)] || '';
      const desc = str(r.description || r.desc || r.effect || r.text || '');
      const apiIcon = str(r.icon_url || r.icon || r.image || '');
      const elemTags = computeElemTags(r.elements, r.damage && r.damage.type, r.type);
      return { id, name, cls, type, mana, category, desc, apiIcon, elemTags };
    }).filter(r => r.name && CLASS_ORDER.includes(r.cls));

    buildUI();
    renderTable();
    applyAbilityDeepLink();
  } catch(err) {
    // Fallback: try index to see other field names
    document.getElementById('status').innerHTML = `⚠️ Could not load live data: ${err.message}. <a href="https://mewgenics.wiki/api/v1/abilities.json" target="_blank">Open JSON</a> to inspect.`;
    document.getElementById('loader').innerHTML = `
      <div class="error-box">
        <strong>Live data unavailable.</strong> The mewgenics.wiki API couldn't be reached from your browser
        (this sometimes happens due to CORS or network issues).<br><br>
        You can still <a href="https://mewgenics.wiki/api/v1/abilities.json" target="_blank">open the JSON directly</a>
        or try refreshing.
      </div>`;
    // Load fallback static data
    loadFallback();
  }
}

function buildUI() {
  // Class buttons
  const cb = document.getElementById('classBtns');
  cb.innerHTML = '';
  ['all', ...CLASS_ORDER].forEach(s => {
    const btn = document.createElement('button');
    btn.textContent = s === 'all' ? 'All' : s.charAt(0).toUpperCase() + s.slice(1);
    if (s === 'all') btn.classList.add('active');
    btn.onclick = () => { activeClass = s; cb.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
    cb.appendChild(btn);
  });

  // Type buttons
  const tb = document.getElementById('typeBtns');
  tb.innerHTML = '';
  [['all','Both types'],['active','Active'],['passive','Passive']].forEach(([val,label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (val === 'all') btn.classList.add('active');
    btn.onclick = () => { activeType = val; tb.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
    tb.appendChild(btn);
  });

  // Category buttons — build from actual data
  const categories = [...new Set(allData.map(r => r.category).filter(Boolean))].sort();
  const catEl = document.getElementById('catBtns');
  catEl.innerHTML = '';
  if (categories.length) {
    const allBtn = document.createElement('button');
    allBtn.textContent = 'All categories';
    allBtn.classList.add('active');
    allBtn.onclick = () => { activeCat = 'all'; catEl.querySelectorAll('button').forEach(b => b.classList.remove('active')); allBtn.classList.add('active'); renderTable(); };
    catEl.appendChild(allBtn);
    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.textContent = cat;
      btn.onclick = () => { activeCat = cat; catEl.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
      catEl.appendChild(btn);
    });
  }

  // Element buttons (fixed set)
  const elEl = document.getElementById('elemBtns');
  elEl.innerHTML = '';
  [['all','All elements'], ...ELEMENT_FILTERS.map(e => [e, e])].forEach(([val,label]) => {
    const btn = document.createElement('button');
    btn.textContent = label;
    if (val === 'all') btn.classList.add('active');
    if (val !== 'all') btn.classList.add('el-' + val);
    btn.onclick = () => { activeElement = val; elEl.querySelectorAll('button').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderTable(); };
    elEl.appendChild(btn);
  });

  document.getElementById('controls').style.display = 'flex';
  document.getElementById('row2').style.display = 'flex';
}

// Switch between table and card-grid views
function setView(mode) {
  if (mode === viewMode) return;
  viewMode = mode;
  document.getElementById('viewTable').classList.toggle('active', mode === 'table');
  document.getElementById('viewCards').classList.toggle('active', mode === 'cards');
  renderTable();
}

function getVisible() {
  const q = document.getElementById('srch').value.toLowerCase();
  return allData.filter(r => {
    if (activeClass !== 'all' && r.cls !== activeClass) return false;
    if (activeType !== 'all' && r.type !== activeType) return false;
    if (activeCat !== 'all' && r.category !== activeCat) return false;
    if (activeElement !== 'all' && !(r.elemTags || []).includes(activeElement)) return false;
    if (q && !r.name.toLowerCase().includes(q) && !r.desc.toLowerCase().includes(q) && !r.cls.includes(q) && !(r.category||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function getSorted() {
  let rows = getVisible();
  if (sortCol >= 0) {
    const keys = ['name','cls','type','category','mana'];
    rows = [...rows].sort((a, b) => {
      const key = keys[sortCol];
      if (key === 'mana') {
        const an = a[key] === '' || a[key] == null ? -1 : parseInt(a[key]);
        const bn = b[key] === '' || b[key] == null ? -1 : parseInt(b[key]);
        return (an - bn) * sortDir;
      }
      const av = (a[key] || '').toLowerCase();
      const bv = (b[key] || '').toLowerCase();
      return av < bv ? -sortDir : av > bv ? sortDir : 0;
    });
  }
  return rows;
}

function iconHtml(r) {
  const iconUrl = localImg(r.apiIcon || ICONS[r.name]);
  return iconUrl
    ? `<img class="ability-icon" src="${iconUrl}" alt="" loading="lazy" onerror="this.style.display='none'">`
    : `<span class="ability-icon-missing"></span>`;
}
function manaText(r) { return r.mana !== '' && r.mana != null ? r.mana + ' MP' : '—'; }

// Render dispatcher — table or card grid depending on viewMode
function renderTable() {
  const wrap = document.getElementById('tblWrap');
  if (!wrap) return;
  const rows = getSorted();
  if (!rows.length) {
    wrap.className = 'tbl-wrap as-cards';
    wrap.innerHTML = '<div class="no-results">No results found</div>';
    document.getElementById('cnt').textContent = 'No entries match';
    return;
  }
  if (viewMode === 'cards') renderCards(wrap, rows);
  else renderTableView(wrap, rows);
  document.getElementById('cnt').textContent = `Showing ${rows.length} of ${allData.length} abilities`;
}

function renderTableView(wrap, rows) {
  wrap.className = 'tbl-wrap';
  wrap.innerHTML = `
    <table id="mainTbl">
      <thead><tr>
        <th onclick="sortBy(0)">Ability</th>
        <th onclick="sortBy(1)">Class</th>
        <th onclick="sortBy(2)">Type</th>
        <th onclick="sortBy(3)">Category</th>
        <th onclick="sortBy(4)">Mana</th>
      </tr></thead>
      <tbody>${rows.map(r => `<tr>
        <td class="icon-cell">${iconHtml(r)}</td>
        <td>
          <strong style="font-weight:600">${esc(r.name)}</strong>
          ${r.desc ? `<div class="desc">${renderDesc(r.desc)}</div>` : ''}
        </td>
        <td><span class="class-badge c-${r.cls}">${r.cls}</span></td>
        <td><span class="type-badge ${r.type==='active'?'t-active':'t-passive'}">${r.type}</span></td>
        <td>${catHtml(r.category)}</td>
        <td style="font-size:13px;color:#555">${manaText(r)}</td>
      </tr>`).join('')}</tbody>
    </table>`;
  // restore sort indicator on the active header
  if (sortCol >= 0) {
    const th = wrap.querySelectorAll('thead th')[sortCol];
    if (th) th.classList.add(sortDir === 1 ? 'sort-asc' : 'sort-desc');
  }
}

// Dense card grid:        [Name]
//                  [Icon] [Description] [MP]
function renderCards(wrap, rows) {
  wrap.className = 'tbl-wrap as-cards';
  wrap.innerHTML = `<div class="cards">${rows.map(r => `
    <div class="ab-card clsbd-${r.cls}" title="${esc(r.cls)} · ${r.type}${r.category?' · '+r.category:''}">
      ${r.category ? `<span class="ab-card-cat" title="${esc(r.category)}">${CATEGORY_SVG[r.category]||''}</span>` : ''}
      <div class="ab-card-name">${esc(r.name)}</div>
      <div class="ab-card-row">
        <span class="ab-card-icon">${iconHtml(r)}</span>
        <div class="ab-card-desc">${r.desc ? renderDesc(r.desc) : '<span style="color:#bbb">—</span>'}</div>
        <span class="ab-card-mp">${manaText(r)}</span>
      </div>
    </div>`).join('')}</div>`;
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Rewrite remote wiki image URLs to the locally-downloaded copies under icons/
// so the page works fully offline. Leaves already-local or empty values untouched.
function localImg(url) {
  if (!url) return url;
  return url.replace('https://mewgenics.wiki/images/', 'icons/');
}

function sortBy(col) {
  if (sortCol === col) sortDir *= -1; else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('thead th').forEach((th, i) => {
    th.classList.remove('sort-asc','sort-desc');
    if (i === col) th.classList.add(sortDir===1?'sort-asc':'sort-desc');
  });
  renderTable();
}

function downloadCSV() {
  const rows = getVisible();
  let csv = 'Ability,Class,Type,Category,Mana Cost,Description\n';
  rows.forEach(r => {
    const e = v => '"' + String(v||'').replace(/"/g,'""') + '"';
    csv += [e(r.name),e(r.cls),e(r.type),e(r.category||''),e(r.mana!==''&&r.mana!=null?r.mana+' MP':'—'),e(r.desc)].join(',') + '\n';
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mewgenics_abilities_by_class.csv';
  a.click();
}

// #a=<game ability id> deep link (KittenShare cards link here): narrow the view to that
// ability via the search box and highlight the first matching row/card. Falls back to
// putting the raw token in the box when the id isn't in the loaded data (offline fallback
// rows carry no ids) — the user still lands somewhere useful, never on a silent no-op.
function applyAbilityDeepLink(){
  const m = location.hash.match(/^#a=(.+)$/);
  if (!m) return;
  const tok = decodeURIComponent(m[1]);
  const rec = Array.isArray(allData) && allData.find(r => r && r.id != null && String(r.id).toLowerCase() === tok.toLowerCase());
  const srch = document.getElementById('srch');
  srch.value = rec ? rec.name : tok;
  renderTable();
  requestAnimationFrame(() => {
    const row = document.querySelector('#tblWrap tbody tr, #tblWrap .ab-card');
    if (row) { row.classList.add('deeplink-hl'); row.scrollIntoView({ block: 'center' }); }
  });
}
